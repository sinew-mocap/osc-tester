name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build and release (e.g. v0.1.0)
        required: true

permissions:
  contents: write

jobs:
  release:
    name: release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: osctest-linux-x64
          - os: macos-latest
            asset: osctest-macos-arm64
          - os: windows-latest
            asset: osctest-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Installs elan + the toolchain from lean-toolchain, then `lake build`.
      - uses: leanprover/lean-action@v1
        with:
          build: true
          test: false

      - name: Stage asset
        shell: bash
        run: |
          mkdir -p out
          # Exact name only — a glob also matches Lake sidecars (osctest.trace, *.export).
          bin=$(find .lake/build/bin -maxdepth 1 -type f \( -name osctest -o -name osctest.exe \) | head -n1)
          test -n "$bin" || { echo "osctest binary not found under .lake/build/bin"; ls -la .lake/build/bin || true; exit 1; }
          cp "$bin" "out/${{ matrix.asset }}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: out/${{ matrix.asset }}
          fail_on_unmatched_files: true
